on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install librsvg
        run: sudo apt-get install librsvg2-bin

      # 1. Set up Python on the runner
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      # 2. Install and configure uv
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # 3. Set up Quarto
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      # 4. Render using uv to provide jupyter and nbformat on the fly
      - name: Render Quarto project
        run: |
          uv run --with jupyter --with nbformat quarto render docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
